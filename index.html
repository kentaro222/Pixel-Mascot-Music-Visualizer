<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Mascot Visualizer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: #fff; }
        canvas { display: block; image-rendering: pixelated; }

        #view-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #view-play { display: none; }

        /* 選択画面のUI（スマホでも見やすいサイズ） */
        #ui-select { 
            background: rgba(10, 5, 20, 0.85); 
            padding: 40px 20px; 
            width: 90%;         
            max-width: 400px;   
            box-sizing: border-box;
            border: 1px solid #ff007f; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
        }
        h2 { font-size: 24px; margin-top: 0; color: #00ffff; text-shadow: 2px 2px 0px #ff007f; letter-spacing: 2px; line-height: 1.4;}
        input[type="file"] { font-size: 16px; margin: 20px 0; max-width: 100%; cursor: pointer;}
        
        button { cursor: pointer; background: linear-gradient(45deg, #00ffff, #ff007f); border: none; color: white; transition: 0.2s;}
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; color: #888; }
        
        #playBtn { padding: 16px 32px; font-weight: bold; border-radius: 8px; font-size: 18px; width: 80%; }
        #ui-select p { font-size: 14px; margin-top: 25px; color: #ccc; line-height: 1.5; }

        /* 画面左上のコントロール群 */
        #top-left-controls {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px; 
        }

        #backBtn {
            padding: 5px 15px; 
            font-size: 24px; 
            line-height: 1; 
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid #00ffff;
            cursor: pointer;
            font-family: serif; 
            border-radius: 6px;
            transition: 0.2s;
        }
        #backBtn:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        /* スリープ防止ボタン */
        #wakeLockBtn {
            width: 38px;
            height: 38px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #444; 
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        #wakeLockBtn.active {
            background: rgba(0, 255, 255, 0.15); 
            border-color: #00ffff;
        }

        #wakeLockBtn .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        #wakeLockBtn.inactive .indicator {
            background-color: #222; 
            border: 1px solid #111;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.8);
        }

        #wakeLockBtn.active .indicator {
            background-color: #e6ffff; 
            border: 1px solid #00ffff;
            box-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff; 
        }

        /* 画面右下のコントロール群 */
        #play-view-controls {
            position: absolute;
            bottom: 2px;
            right: 10px;
            pointer-events: none;
        }

        #music-info { 
            font-size: 10px; 
            text-align: right; 
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

<div id="view-select">
    <div id="ui-select">
        <h2>CITY POP<br>AURORA CRUISING</h2>
        <input type="file" id="audioFile" accept="audio/*"><br>
        <button id="playBtn" disabled>再生開始</button>
        <p>※音量でスクロールが加速し、<br>重低音でジャンプします</p>
    </div>
</div>

<div id="view-play">
    <div id="top-left-controls">
        <button id="backBtn" title="戻る">←</button>
        <button id="wakeLockBtn" class="inactive" title="スリープ防止 (ON/OFF)"><span class="indicator"></span></button>
    </div>
    <div id="play-view-controls">
        <div id="music-info">
            <span id="file-name"></span>
        </div>
    </div>
    <canvas id="stage"></canvas>
</div>

<script>
    const image_url = "Mascot_0.png"; 

    let audioContext, analyser, dataArray;
    let isPlaying = false; 
    let audioBuffer;
    let audioSource;

    let spriteSheet;
    let flippedFrames = [];
    const frameWidth = 16;
    const frameHeight = 16;
    const numFrames = 3;

    let canvas, ctx;
    let frameTimer = 0;
    let frameInterval = 200; 
    let currentScale = 5; 

    let scrollDistance = 0;
    let baseScrollSpeed = 3;

    let wakeLock = null;
    let isWakeLockEnabled = false;

    let character = { 
        x: 0, 
        y: 0, 
        frameIndex: 0, 
        isJumping: false, 
        jumpY: 0,
        vy: 0,          
        gravity: 0.7,   
        jumpPower: -10, 
        cooldown: 0     
    };

    const buildingHeights = Array.from({length: 50}, () => Math.random() * 150 + 50);
    let stars = [];

    const wakeLockBtn = document.getElementById('wakeLockBtn');

    document.getElementById('audioFile').addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            document.getElementById('playBtn').disabled = false;
            document.getElementById('file-name').textContent = "♪ " + e.target.files[0].name;
        }
    });

    document.getElementById('playBtn').addEventListener('click', () => {
        const fileInput = document.getElementById('audioFile');
        if (fileInput.files.length > 0) {
            transitionToPlay(fileInput.files[0]);
        }
    });

    document.getElementById('backBtn').addEventListener('click', () => {
        if(audioSource) audioSource.stop();
        if(audioContext) {
            audioContext.close().then(() => {
                audioContext = null;
                isPlaying = false;
            });
        }
        document.getElementById('view-select').style.display = 'flex';
        document.getElementById('view-play').style.display = 'none';
        
        isWakeLockEnabled = false;
        releaseWakeLock();
    });

    wakeLockBtn.addEventListener('click', async () => {
        isWakeLockEnabled = !isWakeLockEnabled;
        if (isWakeLockEnabled) {
            await requestWakeLock();
        } else {
            releaseWakeLock();
        }
    });

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                updateWakeLockUI(true);
                
                wakeLock.addEventListener('release', () => {
                    wakeLock = null;
                });
            } catch (err) {
                console.error(`Wake Lock error: ${err.name}, ${err.message}`);
                isWakeLockEnabled = false;
                updateWakeLockUI(false);
            }
        } else {
            alert('お使いのブラウザはスリープ防止機能に対応していません。');
            isWakeLockEnabled = false;
            updateWakeLockUI(false);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => {
                wakeLock = null;
            });
        }
        updateWakeLockUI(false);
    }

    function updateWakeLockUI(isActive) {
        if (isActive) {
            wakeLockBtn.classList.remove('inactive');
            wakeLockBtn.classList.add('active');
        } else {
            wakeLockBtn.classList.remove('active');
            wakeLockBtn.classList.add('inactive');
        }
    }

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && isWakeLockEnabled) {
            await requestWakeLock();
        }
    });

    async function init() {
        canvas = document.getElementById('stage');
        ctx = canvas.getContext('2d');
        resizeCanvas();

        for(let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height - 100),
                size: Math.random() * 1.5 + 0.5,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        spriteSheet = new Image();
        spriteSheet.src = image_url;
        await new Promise(resolve => spriteSheet.onload = resolve);

        for (let i = 0; i < numFrames; i++) {
            flippedFrames.push(flipSprite(spriteSheet, i * frameWidth, 0, frameWidth, frameHeight));
        }

        character.x = 100; 
        character.y = canvas.height - 80 - frameHeight * currentScale;

        animate();
    }

    function flipSprite(img, sx, sy, sw, sh) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = sw;
        tempCanvas.height = sh;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.imageSmoothingEnabled = false; 
        tempCtx.scale(-1, 1);
        tempCtx.drawImage(img, sx, sy, sw, sh, -sw, 0, sw, sh);
        return tempCanvas;
    }

    async function transitionToPlay(file) {
        document.getElementById('view-select').style.display = 'none';
        document.getElementById('view-play').style.display = 'block';

        if(audioContext) audioContext.close();
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256; 
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

        if (audioSource) audioSource.stop();
        audioSource = audioContext.createBufferSource();
        audioSource.buffer = audioBuffer;
        audioSource.connect(analyser);
        analyser.connect(audioContext.destination);
        audioSource.start(0);
        
        audioSource.onended = () => {
            if (audioContext && audioContext.state === 'running') {
                isPlaying = false;
            }
        };

        isPlaying = true;
    }

    function animate() {
        requestAnimationFrame(animate);

        let amplitude = 0;
        let bassAmplitude = 0;

        if (audioContext && isPlaying) {
            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
            amplitude = sum / dataArray.length;

            let bassSum = 0;
            for(let i=0; i<=5; i++) bassSum += dataArray[i];
            bassAmplitude = bassSum / 6;

            let speedMultiplier = 1 + (amplitude / 50);
            scrollDistance += baseScrollSpeed * speedMultiplier;
            
            frameInterval = Math.max(50, 200 - amplitude * 2); 

            if (bassAmplitude > 230 && !character.isJumping && character.cooldown === 0) {
                character.isJumping = true;
                character.vy = character.jumpPower; 
            }
                } else {
            // 曲が鳴っていない時（終了後や開始前）のゆっくりとした動き
            scrollDistance += baseScrollSpeed * 0.4; // スクロール速度を通常(3)の 0.4倍 に落とす
            frameInterval = 400; // 足の回転スピードを遅くする（数字が大きいほど遅い。通常時は200）
        }


// オーロラの変化
        let currentHue = (scrollDistance * 0.01) % 360; 
        
        drawAuroraCityBackground(bassAmplitude, amplitude, currentHue);
        drawCharacter();
        updateCharacter(); 
    }

    function drawAuroraCityBackground(bass, amp, hue) {
        const horizonY = canvas.height - 100;

        let bgGradient = ctx.createLinearGradient(0, 0, 0, horizonY);
        bgGradient.addColorStop(0, `hsl(${hue}, 100%, 5%)`); 
        bgGradient.addColorStop(0.4, `hsl(${(hue + 60) % 360}, 100%, 10%)`); 
        bgGradient.addColorStop(1, `hsl(${(hue + 120) % 360}, 100%, 20%)`); 
        
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, canvas.width, horizonY);

        ctx.fillStyle = "white";
        stars.forEach(star => {
            star.x -= (star.speed + (baseScrollSpeed * 0.02)); 
            if (star.x < 0) {
                star.x = canvas.width; 
                star.y = Math.random() * horizonY;
            }
            ctx.globalAlpha = Math.random() * 0.5 + 0.5;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        });
        ctx.globalAlpha = 1.0; 

        const sunRadius = 120 + (bass / 4);
        ctx.fillStyle = "#ff5e00"; 
        ctx.shadowColor = "#ff007f";
        ctx.shadowBlur = 30 + (bass / 2);
        ctx.beginPath();
        ctx.arc(canvas.width * 0.7, horizonY, sunRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0; 

        ctx.fillStyle = bgGradient;
        for (let i = 0; i < 6; i++) {
            let stripeY = horizonY - (i * 25);
            let stripeHeight = 4 + i * 2;
            ctx.fillRect(canvas.width * 0.7 - 173, stripeY, 346, stripeHeight);
        }

        ctx.fillStyle = "#0c0714"; 
        const buildWidth = 80;
        const numBuilds = buildingHeights.length;
        const totalBuildWidth = buildWidth * numBuilds;
        
        for (let i = 0; i < numBuilds + (canvas.width/buildWidth); i++) {
            let x = ((i * buildWidth) - (scrollDistance * 0.2)) % totalBuildWidth;
            if (x < -buildWidth) x += totalBuildWidth;
            
            let h = buildingHeights[i % numBuilds];
            ctx.fillRect(x, horizonY - h, buildWidth + 1, h);
            
            if (i % 3 === 0) {
                ctx.fillStyle = `hsla(${(hue + 90) % 360}, 100%, 70%, ${amp / 255})`;
                ctx.fillRect(x + 20, horizonY - h + 20, 10, 10);
                ctx.fillStyle = "#0c0714"; 
            }
        }

        ctx.fillStyle = "#150a21";
        ctx.fillRect(0, horizonY, canvas.width, 100);

        ctx.strokeStyle = "#ff007f";
        ctx.lineWidth = 4;
        ctx.setLineDash([80, 60]); 
        
        ctx.lineDashOffset = scrollDistance * 1.2; 
        
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 50);
        ctx.lineTo(canvas.width, canvas.height - 50);
        ctx.stroke();
        ctx.setLineDash([]); 

        const lightSpacing = 400;
        for (let i = 0; i < 5; i++) {
            let x = ((i * lightSpacing) - (scrollDistance * 1.2)) % (lightSpacing * 5);
            if (x < -50) x += lightSpacing * 5;

            ctx.fillStyle = "#222";
            ctx.fillRect(x, horizonY - 150, 8, 150);
            
            ctx.fillStyle = "#00ffff";
            ctx.shadowColor = "#00ffff";
            ctx.shadowBlur = 15;
            ctx.fillRect(x - 10, horizonY - 150, 28, 8);
            ctx.shadowBlur = 0;
        }
    }

    function updateCharacter() {
        const now = Date.now();

        if (!character.isJumping && now - frameTimer > frameInterval) {
            frameTimer = now;
            character.frameIndex = (character.frameIndex === 0) ? 1 : 0;
        }

        if (character.isJumping) {
            character.frameIndex = 2; 
            character.vy += character.gravity; 
            character.jumpY += character.vy;

            if (character.jumpY >= 0) {
                character.jumpY = 0;
                character.vy = 0;
                character.isJumping = false;
                character.cooldown = 12; 
                character.frameIndex = 0; 
            }
        }

        if (character.cooldown > 0) character.cooldown--;
    }

    function drawCharacter() {
        if (flippedFrames.length > 0) {
            const frameToDraw = flippedFrames[character.frameIndex];
            const dw = frameWidth * currentScale;
            const dh = frameHeight * currentScale;
            const dx = character.x;
            const dy = character.y + character.jumpY; 
            
            ctx.shadowColor = "rgba(0, 0, 0, 0.8)";
            ctx.shadowBlur = 5;
            ctx.shadowOffsetY = 5;
            
            ctx.drawImage(frameToDraw, 0, 0, frameWidth, frameHeight, dx, dy, dw, dh);
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
        }
    }

    /* ★キャンバスの内部解像度を調整するロジックを追加 */
    function resizeCanvas() {
        let w = window.innerWidth;
        let h = window.innerHeight;

        // スマホなどの狭い画面でも、内部の描画解像度は最低980pxを保つ（＝引きの画角を再現）
        if (w < 980) {
            const ratio = h / w;
            w = 980;
            h = 980 * ratio;
        }

        // キャンバスの内部解像度を設定
        canvas.width = w;
        canvas.height = h;

        // 見た目（CSS）のサイズは実際の画面にぴったりフィットさせる
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';

        ctx.imageSmoothingEnabled = false; 
        if(character) {
            character.x = 100; 
            character.y = canvas.height - 80 - frameHeight * currentScale;
        }
    }

    window.addEventListener('resize', resizeCanvas);

    init();
</script>
</body>
</html>
